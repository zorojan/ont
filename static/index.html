<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ontology Discovery Catalog</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&f[]=cabinet-grotesk@400,500,700,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-primary-highlight:#cedcd8;
  --color-success:#437a22;--color-success-highlight:#d4dfcc;
  --color-warning:#964219;--color-warning-highlight:#ddcfc6;
  --color-error:#a12c7b;--color-error-highlight:#e0ced7;
  --color-orange:#da7101;--color-orange-highlight:#e7d7c4;
  --color-blue:#006494;--color-blue-highlight:#c6d8e4;
  --color-gold:#d19900;--color-gold-highlight:#e9e0c6;
  --color-purple:#7a39bb;--color-purple-highlight:#dacfde;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --font-display:'Cabinet Grotesk',sans-serif;
  --font-body:'Satoshi',sans-serif;
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
  --color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-primary-highlight:#313b3b;
  --color-success:#6daa45;--color-success-highlight:#3a4435;
  --color-warning:#bb653b;--color-warning-highlight:#564942;
  --color-error:#d163a7;--color-error-highlight:#4c3d46;
  --color-orange:#fdab43;--color-orange-highlight:#564b3e;
  --color-blue:#5591c7;--color-blue-highlight:#3a4550;
  --color-gold:#e8af34;--color-gold-highlight:#4d4332;
  --color-purple:#a86fdf;--color-purple-highlight:#4e4652;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.2);
  --shadow-md:0 4px 12px oklch(0 0 0/0.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.4);
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-sm);color:var(--color-text);background:var(--color-bg);line-height:1.6}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a,button,[role="button"]{transition:color var(--transition),background var(--transition),border-color var(--transition),box-shadow var(--transition)}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}


.pagination { padding: 1.5rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem; }
.page-btn { padding: 0.4rem 0.8rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface); cursor: pointer; color: var(--color-text); }
.page-btn:hover { background: var(--color-surface-dynamic); }
.page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.page-btn.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
.enrich-btn { position: absolute; top: 1rem; right: 1rem; padding: 0.4rem; border-radius: var(--radius-md); background: var(--color-surface-offset); border: 1px solid var(--color-border); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; z-index: 10; }
.enrich-btn:hover { background: var(--color-purple-highlight); border-color: var(--color-purple); color: var(--color-purple); }
.enrich-btn.loading { opacity: 0.7; cursor: wait; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

/* Layout */
.app{display:grid;grid-template-rows:56px 1fr;min-height:100dvh}
.topbar{height:56px;border-bottom:1px solid var(--color-divider);background:var(--color-surface);display:flex;align-items:center;padding:0 1.5rem;gap:1rem;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:0.5rem;font-family:var(--font-display);font-weight:800;font-size:var(--text-base);color:var(--color-text);text-decoration:none;white-space:nowrap}
.logo svg{flex-shrink:0;color:var(--color-primary)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:0.5rem}
.icon-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--radius-md);color:var(--color-text-muted);transition:background var(--transition),color var(--transition)}
.icon-btn:hover{background:var(--color-surface-dynamic);color:var(--color-text)}
.main{display:grid;grid-template-columns:280px 1fr;overflow:hidden;height:calc(100dvh - 56px)}

/* Sidebar */
.sidebar{border-right:1px solid var(--color-divider);background:var(--color-surface);overflow-y:auto;padding:1rem 0;display:flex;flex-direction:column;gap:0.25rem}
.sidebar-section{padding:0.5rem 1rem 0.25rem;font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-faint)}
.filter-group{padding:0 0.75rem;display:flex;flex-direction:column;gap:0.125rem}
.filter-chip{display:flex;align-items:center;gap:0.5rem;padding:0.375rem 0.5rem;border-radius:var(--radius-md);cursor:pointer;font-size:var(--text-xs);color:var(--color-text-muted);transition:background var(--transition),color var(--transition);width:100%;text-align:left}
.filter-chip:hover{background:var(--color-surface-dynamic);color:var(--color-text)}
.filter-chip.active{background:var(--color-primary-highlight);color:var(--color-primary)}
.filter-chip .count{margin-left:auto;font-size:0.7rem;background:var(--color-surface-dynamic);padding:0 0.35rem;border-radius:var(--radius-full);line-height:1.6;color:var(--color-text-faint)}
.filter-chip.active .count{background:var(--color-primary-highlight);color:var(--color-primary)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sidebar-divider{height:1px;background:var(--color-divider);margin:0.75rem 0.75rem}

/* Content */
.content{overflow-y:auto;display:flex;flex-direction:column}
.content-header{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--color-divider);background:var(--color-surface);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap svg{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--color-text-faint);pointer-events:none}
.search-input{width:100%;padding:0.5rem 0.75rem 0.5rem 2.25rem;background:var(--color-surface-offset);border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--color-text);outline:none;transition:border-color var(--transition),box-shadow var(--transition)}
.search-input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px color-mix(in oklch,var(--color-primary) 15%,transparent)}
.search-input::placeholder{color:var(--color-text-faint)}
.content-meta{font-size:var(--text-xs);color:var(--color-text-muted);white-space:nowrap}
.view-toggle{display:flex;border:1px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden}
.view-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;color:var(--color-text-muted)}
.view-btn.active{background:var(--color-surface-dynamic);color:var(--color-primary)}
.view-btn:hover:not(.active){background:var(--color-surface-offset)}

/* Catalog grid */
.catalog{padding:1.25rem 1.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(min(360px,100%),1fr));gap:1rem;align-content:start}
.catalog.list-view{grid-template-columns:1fr}

/* Cards */
.card{background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h/0.08);border-radius:var(--radius-lg);padding:1rem;cursor:pointer;transition:box-shadow var(--transition),border-color var(--transition),transform 0.15s ease;display:flex;flex-direction:column;gap:0.75rem}
.card:hover{box-shadow:var(--shadow-md);border-color:oklch(from var(--color-primary) l c h/0.3);transform:translateY(-1px)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem}
.card-title{font-family:var(--font-display);font-weight:700;font-size:var(--text-base);color:var(--color-text);line-height:1.3}
.card-id{font-size:var(--text-xs);color:var(--color-text-faint);font-family:monospace;background:var(--color-surface-offset);padding:0.15rem 0.4rem;border-radius:var(--radius-sm);white-space:nowrap;border:1px solid var(--color-border)}
.card-desc{font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}
.domain-badge{font-size:0.7rem;font-weight:600;padding:0.2rem 0.55rem;border-radius:var(--radius-full);display:inline-flex;align-items:center;gap:0.25rem;white-space:nowrap}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.card-formats{display:flex;gap:0.25rem;flex-wrap:wrap}
.fmt{font-size:0.65rem;font-weight:600;padding:0.15rem 0.4rem;border-radius:var(--radius-sm);background:var(--color-surface-dynamic);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em;border:1px solid var(--color-border)}
.quality-bar{height:3px;border-radius:var(--radius-full);background:var(--color-surface-dynamic);overflow:hidden;flex:1;min-width:60px}
.quality-fill{height:100%;border-radius:var(--radius-full);background:var(--color-primary)}
.card-tags{display:flex;gap:0.25rem;flex-wrap:wrap}
.tag{font-size:0.65rem;padding:0.1rem 0.4rem;border-radius:var(--radius-full);background:var(--color-surface-offset);color:var(--color-text-faint);border:1px solid var(--color-border)}

/* List view card */
.catalog.list-view .card{flex-direction:row;align-items:center;gap:1rem;padding:0.75rem 1rem}
.catalog.list-view .card-body{flex:1;min-width:0}
.catalog.list-view .card-top{margin-bottom:0.2rem}
.catalog.list-view .card-desc{-webkit-line-clamp:1}
.catalog.list-view .card-bottom{display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem;flex-shrink:0}

/* Domain colors */
.dom-bim{background:var(--color-blue-highlight);color:var(--color-blue)}
.dom-iot{background:var(--color-primary-highlight);color:var(--color-primary)}
.dom-energy{background:var(--color-gold-highlight);color:var(--color-gold)}
.dom-food{background:var(--color-success-highlight);color:var(--color-success)}
.dom-finance{background:var(--color-warning-highlight);color:var(--color-warning)}
.dom-health{background:var(--color-error-highlight);color:var(--color-error)}
.dom-legal{background:var(--color-purple-highlight);color:var(--color-purple)}
.dom-data{background:var(--color-orange-highlight);color:var(--color-orange)}
.dom-industry{background:color-mix(in oklch,var(--color-gold) 15%,var(--color-surface));color:var(--color-gold)}
.dom-web{background:var(--color-blue-highlight);color:var(--color-blue)}
.dom-enterprise{background:var(--color-surface-dynamic);color:var(--color-text-muted)}
.dom-cloud{background:var(--color-primary-highlight);color:var(--color-primary)}
.dom-cyber{background:var(--color-error-highlight);color:var(--color-error)}
.dom-science{background:var(--color-success-highlight);color:var(--color-success)}
.dom-kg{background:var(--color-purple-highlight);color:var(--color-purple)}

/* Detail panel */
.detail-overlay{position:fixed;inset:0;background:oklch(0 0 0/0.5);z-index:200;display:none;align-items:flex-start;justify-content:flex-end}
.detail-overlay.open{display:flex}
.detail-panel{width:min(540px,100vw);height:100dvh;background:var(--color-surface);border-left:1px solid var(--color-border);overflow-y:auto;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.panel-header{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--color-divider);display:flex;gap:1rem;align-items:flex-start;position:sticky;top:0;background:var(--color-surface);z-index:10}
.panel-title{flex:1;font-family:var(--font-display);font-weight:800;font-size:var(--text-lg);color:var(--color-text);line-height:1.2}
.panel-body{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1.5rem;flex:1}
.panel-section-title{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-faint);margin-bottom:0.6rem}
.entity-grid{display:flex;flex-wrap:wrap;gap:0.4rem}
.entity-chip{font-size:var(--text-xs);padding:0.3rem 0.6rem;border-radius:var(--radius-md);background:var(--color-surface-offset);border:1px solid var(--color-border);color:var(--color-text);font-family:monospace;cursor:pointer;transition:all var(--transition)}
.entity-chip:hover{border-color:var(--color-primary);color:var(--color-primary);background:var(--color-primary-highlight)}
.entity-chip.selected{border-color:var(--color-primary);color:var(--color-primary);background:var(--color-primary-highlight)}
.url-link{display:flex;align-items:center;gap:0.5rem;font-size:var(--text-xs);color:var(--color-primary);padding:0.4rem 0.6rem;background:var(--color-surface-offset);border-radius:var(--radius-md);border:1px solid var(--color-border);text-decoration:none;word-break:break-all;line-height:1.4;transition:background var(--transition),border-color var(--transition)}
.url-link:hover{background:var(--color-primary-highlight);border-color:var(--color-primary)}
.url-link svg{flex-shrink:0;color:var(--color-text-faint)}
.info-row{display:flex;align-items:baseline;gap:0.5rem;font-size:var(--text-xs);padding:0.4rem 0}
.info-label{color:var(--color-text-faint);min-width:100px;flex-shrink:0}
.info-val{color:var(--color-text);font-weight:500}
.quality-big{display:flex;align-items:center;gap:0.75rem}
.quality-num{font-family:var(--font-display);font-size:var(--text-xl);font-weight:800;color:var(--color-primary)}
.quality-bar-big{flex:1;height:6px;border-radius:var(--radius-full);background:var(--color-surface-dynamic)}
.quality-fill-big{height:100%;border-radius:var(--radius-full);background:var(--color-primary)}

/* Questionnaire */
.questionnaire{background:var(--color-surface-offset);border-radius:var(--radius-lg);padding:1rem;border:1px solid var(--color-border)}
.q-item{display:flex;gap:0.6rem;padding:0.5rem 0;border-bottom:1px solid var(--color-divider);font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.4}
.q-item:last-child{border-bottom:none;padding-bottom:0}
.q-num{color:var(--color-primary);font-weight:700;min-width:18px;flex-shrink:0;font-variant-numeric:tabular-nums}
.q-text{flex:1}
.q-entity{font-family:monospace;font-weight:600;color:var(--color-text)}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.5rem 1rem;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;cursor:pointer;transition:all var(--transition)}
.btn-primary{background:var(--color-primary);color:#fff}
.btn-primary:hover{background:var(--color-primary-hover)}
.btn-ghost{background:transparent;color:var(--color-text-muted);border:1px solid var(--color-border)}
.btn-ghost:hover{background:var(--color-surface-dynamic);color:var(--color-text)}
.btn-sm{padding:0.35rem 0.7rem;font-size:var(--text-xs)}
.badge-status{font-size:0.65rem;font-weight:700;padding:0.2rem 0.55rem;border-radius:var(--radius-full);text-transform:uppercase;letter-spacing:0.05em}
.status-verified{background:var(--color-success-highlight);color:var(--color-success)}
.status-candidate{background:var(--color-warning-highlight);color:var(--color-warning)}
.empty-state{padding:3rem 2rem;text-align:center;color:var(--color-text-muted);display:flex;flex-direction:column;align-items:center;gap:1rem}
.empty-state h3{color:var(--color-text);font-size:var(--text-base)}
.stats-row{display:flex;gap:1rem;padding:0.75rem 1.5rem;background:var(--color-surface-offset);border-bottom:1px solid var(--color-divider)}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:0.1rem}
.stat-num{font-family:var(--font-display);font-weight:800;font-size:var(--text-base);color:var(--color-primary);font-variant-numeric:tabular-nums}
.stat-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-text-faint)}
@media(max-width:768px){.main{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>
<div class="app">
  <!-- Topbar -->
  <header class="topbar">
    <a href="#" class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
      </svg>
      Ontology Discovery
    </a>
    <div style="color:var(--color-text-muted);font-size:var(--text-xs);border-left:1px solid var(--color-divider);padding-left:1rem">Brain Builder · Catalog Module</div>
    <div class="topbar-right">
      <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="main">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">Тип ресурса</div>
      <div class="filter-group">
        <button class="filter-chip active" data-filter="all" data-group="type">
          <span class="dot" style="background:var(--color-text-faint)"></span>All
          <span class="count" id="cnt-all">0</span>
        </button>
        <button class="filter-chip" data-filter="ontology" data-group="type">
          <span class="dot" style="background:var(--color-primary)"></span>Ontology
          <span class="count" id="cnt-ontology">0</span>
        </button>
        <button class="filter-chip" data-filter="vocabulary" data-group="type">
          <span class="dot" style="background:var(--color-blue)"></span>Vocabulary
          <span class="count" id="cnt-vocabulary">0</span>
        </button>
        <button class="filter-chip" data-filter="taxonomy" data-group="type">
          <span class="dot" style="background:var(--color-gold)"></span>Taxonomy
          <span class="count" id="cnt-taxonomy">0</span>
        </button>
        <button class="filter-chip" data-filter="framework" data-group="type">
          <span class="dot" style="background:var(--color-orange)"></span>Framework
          <span class="count" id="cnt-framework">0</span>
        </button>
        <button class="filter-chip" data-filter="standard" data-group="type">
          <span class="dot" style="background:var(--color-success)"></span>Standard
          <span class="count" id="cnt-standard">0</span>
        </button>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Отрасль</div>
      <div class="filter-group" id="industry-filters"></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Статус</div>
      <div class="filter-group">
        <button class="filter-chip" data-filter="verified" data-group="status">
          <span class="dot" style="background:var(--color-success)"></span>Verified
          <span class="count" id="cnt-verified">0</span>
        </button>
        <button class="filter-chip" data-filter="candidate" data-group="status">
          <span class="dot" style="background:var(--color-warning)"></span>Candidate
          <span class="count" id="cnt-candidate">0</span>
        </button>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Формат</div>
      <div class="filter-group" id="format-filters"></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Страна / Регион</div>
      <div class="filter-group" id="region-filters"></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Масштаб покрытия</div>
      <div class="filter-group" id="scope-filters"></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Уровень уверенности</div>
      <div class="filter-group" id="confidence-filters"></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Домен / Область</div>
      <div class="filter-group" id="domain-filters"></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">Теги (Top-20)</div>
      <div class="filter-group" id="tags-filters"></div>
    </aside>

    <!-- Content -->
    <main class="content">
      <div class="content-header">
        <div class="search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>

  <div class="detail-panel" id="detail-panel">
    <div class="panel-header">
      <div class="panel-title" id="panel-title"></div>
      <button class="icon-btn" onclick="closeDetail()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="panel-body" id="panel-body"></div>

<script>
(function(){const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';r.setAttribute('data-theme',d);t&&t.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d)})})();

let CATALOG = [];
let currentPage = 1;
let totalPages = 1;
let totalItems = 0;

// Domain → CSS class mapping
const DOMAIN_CLASS = {
  "Universal / Web":"dom-web","Enterprise / Operations":"dom-enterprise","Industry Classification":"dom-data",
  "Supply Chain / Retail":"dom-industry","Procurement / Catalog":"dom-industry","Finance / Banking":"dom-finance",
  "IoT / Smart Home":"dom-iot","BIM / Construction":"dom-bim","Legal / Privacy":"dom-legal",
  "BIM / Architecture":"dom-bim","Food / Agriculture":"dom-food","Energy / Utilities":"dom-energy",
  "Industry 4.0 / Manufacturing":"dom-industry","Science / Engineering":"dom-science","Cybersecurity":"dom-cyber",
  "Data Governance":"dom-data","Data Catalog / FAIR":"dom-data","Enterprise / HR":"dom-enterprise",
  "E-commerce / Retail":"dom-enterprise","Manufacturing / Lean":"dom-industry","Healthcare / Medicine":"dom-health",
  "Energy / Power Grid":"dom-energy","Industry / Digital Twin":"dom-industry","IoT / Sensors":"dom-iot",
  "Knowledge Graph":"dom-kg","Enterprise / Upper":"dom-enterprise"
};
const TYPE_COLOR = {ontology:"var(--color-primary)",vocabulary:"var(--color-blue)",taxonomy:"var(--color-gold)",framework:"var(--color-orange)",standard:"var(--color-success)"};

let activeFilters = {type:"all",industry:null,status:null,format:null,domain:null,tag:null,region:null,scope:null,confidence:null};
let viewMode = "grid";
let searchQuery = "";
let selectedItem = null;
let selectedEntities = [];

function getDomainClass(domain){return DOMAIN_CLASS[domain]||"dom-enterprise";}
function qualityColor(q){return q>=0.95?"var(--color-success)":q>=0.85?"var(--color-primary)":"var(--color-warning)";}

async function fetchPage(page = 1) {
    currentPage = page;
    let url = `/api/resources?page=${page}&limit=50`;
    if(searchQuery) url += `&q=${encodeURIComponent(searchQuery)}`;
    if(activeFilters.type && activeFilters.type !== "all") url += `&type=${encodeURIComponent(activeFilters.type)}`;
    if(activeFilters.status) url += `&status=${encodeURIComponent(activeFilters.status)}`;
    if(activeFilters.industry) url += `&industry=${encodeURIComponent(activeFilters.industry)}`;
    if(activeFilters.format) url += `&format=${encodeURIComponent(activeFilters.format)}`;
    if(activeFilters.domain) url += `&domain=${encodeURIComponent(activeFilters.domain)}`;
    if(activeFilters.tag) url += `&tag=${encodeURIComponent(activeFilters.tag)}`;
    if(activeFilters.region) url += `&region=${encodeURIComponent(activeFilters.region)}`;
    if(activeFilters.scope) url += `&scope=${encodeURIComponent(activeFilters.scope)}`;
    if(activeFilters.confidence) url += `&confidence=${encodeURIComponent(activeFilters.confidence)}`;
    
    try {
        const res = await fetch(url);
        if(!res.ok) throw new Error("API Error");
        const json = await res.json();
        CATALOG = json.data;
        totalPages = json.total_pages;
        totalItems = json.total;
        render();
        renderPagination();
        // Scroll content area to top on page change
        document.querySelector('.content')?.scrollTo({top: 0, behavior: 'smooth'});
    } catch(err) {
        console.error(err);
    }
}

async function enrichItem(id, event) {
    if(event) event.stopPropagation();
    const btn = document.getElementById(`enrich-btn-${id}`);
    if(btn) btn.classList.add('loading');
    
    try {
        const res = await fetch(`/api/resources/${id}/enrich`, { method: 'POST' });
        if(res.ok) {
            const updated = await res.json();
            const idx = CATALOG.findIndex(c => c.id === id);
            if(idx !== -1) {
                CATALOG[idx] = updated;
                render();
            }
            if(selectedItem && selectedItem.id === id) {
                openDetail(id); // Re-render detail panel
            }
            return true;
        }
    } catch(err) {
        console.error("Enrichment failed", err);
    }
    return false;
}

async function batchEnrich() {
    const btn = document.getElementById('batch-enrich-btn');
    const originalText = btn.innerHTML;
    
    // Find items on current page that need enrichment (no AI Enriched tag)
    const itemsToEnrich = CATALOG.filter(item => !(item.tags || []).includes("AI Enriched"));
    
    if (itemsToEnrich.length === 0) {
        alert("На текущей странице нет ресурсов для обогащения!");
        return;
    }
    
    if (!confirm(`Обогатить ${itemsToEnrich.length} ресурсов на этой странице через LLM? Это может занять некоторое время.`)) {
        return;
    }
    
    btn.innerHTML = `✨ Загрузка (0/${itemsToEnrich.length})`;
    btn.disabled = true;
    
    let enrichedCount = 0;
    
    // Process sequentially to not overload the API or rate limit
    for (const item of itemsToEnrich) {
        await enrichItem(item.id, null);
        enrichedCount++;
        btn.innerHTML = `✨ Загрузка (${enrichedCount}/${itemsToEnrich.length})`;
    }
    
    btn.innerHTML = originalText;
    btn.disabled = false;
    alert(`Обогащение завершено! Обработано: ${enrichedCount}`);
}

function renderStats(){
  const row = document.getElementById("stats-row");
  row.innerHTML = `
    <div class="stat-item"><span class="stat-num">${totalItems}</span><span class="stat-label">Найдено</span></div>
    <div class="stat-item" style="border-left:1px solid var(--color-divider);padding-left:1rem"><span class="stat-num">${currentPage} / ${totalPages || 1}</span><span class="stat-label">Страница</span></div>
  `;
}

function renderCard(item){
  const dc = getDomainClass(item.domain);
  const qw = Math.round(item.quality*100);
  const tags = item.tags || [];
  const sdesc = item.short_description || item.description;
  const isEnriched = tags.includes("AI Enriched");
  const confColor = item.confidence==='High'?'var(--color-success)':item.confidence==='Medium'?'var(--color-warning)':'var(--color-error)';
  const regionLabel = item.country_or_region || 'Global';
  
  return `<div class="card" onclick="openDetail('${item.id}')" style="position:relative;">
    <button id="enrich-btn-${item.id}" class="enrich-btn" onclick="enrichItem('${item.id}', event)" title="🪄 Обогатить через AI">
        ${isEnriched ? '✨' : '🪄'}
    </button>
    <div class="card-top" style="padding-right: 2rem;">
      <div class="card-title">${item.title}</div>
      <div class="card-id">${item.id}</div>
    </div>
    <div class="card-desc">${sdesc}</div>
    <div class="card-meta">
      <span class="domain-badge ${dc}">${regionLabel}</span>
      <span class="badge-status status-${item.status}">${item.status}</span>
      ${item.confidence ? `<span style="font-size:0.6rem;font-weight:700;color:${confColor};text-transform:uppercase">${item.confidence}</span>` : ''}
      <div class="quality-bar" title="Quality: ${qw}%"><div class="quality-fill" style="width:${qw}%;background:${qualityColor(item.quality)}"></div></div>
    </div>
    <div class="card-formats">${(item.formats||[]).map(f=>`<span class="fmt">${f}</span>`).join("")}</div>
    <div class="card-tags">${tags.slice(0,5).map(t=>`<span class="tag" ${t==='AI Enriched'?'style="color:var(--color-purple);border-color:var(--color-purple);background:var(--color-purple-highlight)"':''}>${t}</span>`).join("")}</div>
  </div>`;
}

function renderListCard(item){
  const dc = getDomainClass(item.domain);
  const qw = Math.round(item.quality*100);
  const tags = item.tags || [];
  const sdesc = item.short_description || item.description;
  const isEnriched = tags.includes("AI Enriched");

  return `<div class="card" onclick="openDetail('${item.id}')" style="position:relative;">
    <div class="card-body" style="flex:1;min-width:0;padding-right: 2rem;">
      <div class="card-top"><div class="card-title" style="font-size:var(--text-sm)">${item.title}</div><div class="card-id">${item.id}</div></div>
      <div class="card-desc">${sdesc}</div>
      <div class="card-meta" style="margin-top:0.4rem">
        <span class="domain-badge ${dc}">${item.country_or_region || item.domain}</span>
        ${tags.slice(0,4).map(t=>`<span class="tag">${t}</span>`).join("")}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem;flex-shrink:0">
      <span class="badge-status status-${item.status}">${item.status}</span>
      <div style="font-size:var(--text-xs);color:${qualityColor(item.quality)};font-weight:700;font-variant-numeric:tabular-nums">${qw}%</div>
      <div class="card-formats">${(item.formats||[]).map(f=>`<span class="fmt">${f}</span>`).join("")}</div>
      <button id="enrich-btn-${item.id}" class="enrich-btn" style="position:static; margin-top:0.5rem;" onclick="enrichItem('${item.id}', event)" title="🪄 Обогатить через AI">${isEnriched ? '✨' : '🪄'} Обогатить</button>
    </div>
  </div>`;
}

function render(){
  const items = CATALOG;
  const cat = document.getElementById("catalog");
  document.getElementById("result-count").textContent = `Найдено: ${totalItems}`;
  renderStats();
  if(!items.length){
    cat.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-faint)" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M11 8v3M11 14h.01"/></svg><h3>Ничего не найдено</h3><p>Попробуйте изменить фильтры или поисковый запрос</p></div>`;
    return;
  }
  cat.innerHTML = items.map(i => viewMode==="list" ? renderListCard(i) : renderCard(i)).join("");
}

function renderPagination() {
    const pag = document.getElementById("pagination");
    if(totalPages <= 1) {
        pag.innerHTML = "";
        return;
    }
    
    let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="fetchPage(${currentPage - 1})">← Назад</button>`;
    
    let start = Math.max(1, currentPage - 2);
    let end = Math.min(totalPages, start + 4);
    if(end - start < 4) start = Math.max(1, end - 4);
    
    for(let i = start; i <= end; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="fetchPage(${i})">${i}</button>`;
    }
    
    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="fetchPage(${currentPage + 1})">Вперед →</button>`;
    pag.innerHTML = html;
}

async function buildSidebarFilters(){
  try {
    const res = await fetch('/api/filters');
    if(!res.ok) throw new Error("API returned " + res.status);
    const data = await res.json();
    
    console.log("Filters loaded:", data);
    
    // Update type counts
    document.getElementById("cnt-all").textContent = data.total;
    ["ontology","vocabulary","taxonomy","framework","standard"].forEach(t=>{
      const el = document.getElementById("cnt-"+t);
      if(el) el.textContent = data.types[t] || 0;
    });
    
    // Update status counts
    document.getElementById("cnt-verified").textContent = data.statuses.verified || 0;
    document.getElementById("cnt-candidate").textContent = data.statuses.candidate || 0;
    
    // Build industry filters
    const inds = Object.entries(data.industries || {}).sort((a,b) => b[1]-a[1]);
    document.getElementById("industry-filters").innerHTML = inds.length
      ? inds.map(([ind, cnt])=>`
        <button class="filter-chip" data-filter="${ind}" data-group="industry">
          <span class="dot" style="background:var(--color-gold)"></span>${ind.charAt(0).toUpperCase()+ind.slice(1)}
          <span class="count">${cnt}</span>
        </button>`).join("")
      : '<div style="padding:0.5rem;font-size:var(--text-xs);color:var(--color-text-faint)">Пока нет данных — используйте AI-обогащение</div>';
      
    // Build format filters
    const fmts = Object.entries(data.formats || {}).sort((a,b) => b[1]-a[1]);
    document.getElementById("format-filters").innerHTML = fmts.length
      ? fmts.map(([f, cnt])=>`
        <button class="filter-chip" data-filter="${f}" data-group="format">
          <span class="fmt">${f.toUpperCase()}</span>
          <span class="count">${cnt}</span>
        </button>`).join("")
      : '<div style="padding:0.5rem;font-size:var(--text-xs);color:var(--color-text-faint)">Нет данных</div>';
    
    // Build region filters
    const REGION_LABELS = {Global:'🌐 Global',US:'🇺🇸 US',EU:'🇪🇺 EU',UK:'🇬🇧 UK',FR:'🇫🇷 France',DE:'🇩🇪 Germany',CN:'🇨🇳 China',JP:'🇯🇵 Japan',KR:'🇰🇷 Korea',AU:'🇦🇺 Australia',IN:'🇮🇳 India',BR:'🇧🇷 Brazil',CA:'🇨🇦 Canada',RU:'🇷🇺 Russia',AM:'🇦🇲 Armenia'};
    const regionEntries = Object.entries(data.regions || {}).filter(([k])=>k!=='Unknown');
    const regionEl = document.getElementById("region-filters");
    if(regionEl) {
      regionEl.innerHTML = regionEntries.length
        ? regionEntries.map(([r, cnt])=>`
          <button class="filter-chip" data-filter="${r}" data-group="region">
            <span style="font-size:0.85rem">${(REGION_LABELS[r]||r).split(' ')[0]}</span>${(REGION_LABELS[r]||r).split(' ').slice(1).join(' ')||r}
            <span class="count">${cnt}</span>
          </button>`).join("")
        : '<div style="padding:0.5rem;font-size:var(--text-xs);color:var(--color-text-faint)">Нет данных</div>';
    }
    
    // Build scope filters
    const SCOPE_COLORS = {Universal:'var(--color-blue)',['Domain-specific']:'var(--color-gold)',Regional:'var(--color-orange)'};
    const scopeEntries = Object.entries(data.scopes || {}).filter(([k])=>k!=='Unknown');
    const scopeEl = document.getElementById("scope-filters");
    if(scopeEl) {
      scopeEl.innerHTML = scopeEntries.length
        ? scopeEntries.map(([s, cnt])=>`
          <button class="filter-chip" data-filter="${s}" data-group="scope">
            <span class="dot" style="background:${SCOPE_COLORS[s]||'var(--color-text-faint)'}"></span>${s}
            <span class="count">${cnt}</span>
          </button>`).join("")
        : '<div style="padding:0.5rem;font-size:var(--text-xs);color:var(--color-text-faint)">Нет данных</div>';
    }
    
    // Build confidence filters
    const CONF_COLORS = {High:'var(--color-success)',Medium:'var(--color-warning)',Low:'var(--color-error)'};
    const confEntries = Object.entries(data.confidence || {}).filter(([k])=>k!=='Unknown');
    const confEl = document.getElementById("confidence-filters");
    if(confEl) {
      confEl.innerHTML = confEntries.length
        ? confEntries.map(([cf, cnt])=>`
          <button class="filter-chip" data-filter="${cf}" data-group="confidence">
            <span class="dot" style="background:${CONF_COLORS[cf]||'var(--color-text-faint)'}"></span>${cf}
            <span class="count">${cnt}</span>
          </button>`).join("")
        : '<div style="padding:0.5rem;font-size:var(--text-xs);color:var(--color-text-faint)">Нет данных</div>';
    }
    
    // Build domain filters
    const doms = Object.entries(data.domains || {}).sort((a,b) => b[1]-a[1]).slice(0, 15);
    const domEl = document.getElementById("domain-filters");
    if(domEl) {
      domEl.innerHTML = doms.length
        ? doms.map(([d, cnt])=>`
          <button class="filter-chip" data-filter="${d}" data-group="domain">
            <span class="dot" style="background:var(--color-blue)"></span>${d}
            <span class="count">${cnt}</span>
          </button>`).join("")
        : '<div style="padding:0.5rem;font-size:var(--text-xs);color:var(--color-text-faint)">Нет данных</div>';
    }
    
    // Build top tags
    const tagEntries = Object.entries(data.tags || {}).slice(0, 20);
    const tagsEl = document.getElementById("tags-filters");
    if(tagsEl) {
      tagsEl.innerHTML = tagEntries.length
        ? tagEntries.map(([t, cnt])=>`
          <button class="filter-chip" data-filter="${t}" data-group="tag">
            <span class="dot" style="background:var(--color-purple)"></span>${t}
            <span class="count">${cnt}</span>
          </button>`).join("")
        : '<div style="padding:0.5rem;font-size:var(--text-xs);color:var(--color-text-faint)">Нет данных</div>';
    }

    // Rebind click handlers for ALL filter chips (static + dynamic)
    document.querySelectorAll(".filter-chip[data-group]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const group = btn.dataset.group;
        const val = btn.dataset.filter;
        document.querySelectorAll(`.filter-chip[data-group="${group}"]`).forEach(b=>b.classList.remove("active"));
        if(activeFilters[group]===val && group!=="type"){
          activeFilters[group]=null;
        } else {
          btn.classList.add("active");
          activeFilters[group] = group==="type" ? val : (activeFilters[group]===val?null:val);
          if(group!=="type") btn.classList.toggle("active", activeFilters[group]!==null);
        }
        if(group==="type") btn.classList.add("active");
        fetchPage(1);
      });
    });
  } catch(e) {
    console.error("Failed to load filters:", e);
    document.getElementById("industry-filters").innerHTML = '<div style="padding:0.5rem;font-size:var(--text-xs);color:var(--color-error)">Ошибка загрузки фильтров</div>';
  }
}

function setView(mode){
  viewMode=mode;
  document.getElementById("catalog").className = "catalog"+(mode==="list"?" list-view":"");
  document.getElementById("grid-btn").classList.toggle("active",mode==="grid");
  document.getElementById("list-btn").classList.toggle("active",mode==="list");
  render();
}

function generateQuestionnaire(item, entities){
  const ents = entities.length > 0 ? entities : (item.entities||[]).slice(0,8);
  if(!ents.length) return `<div style="color:var(--color-text-faint)">Нет сущностей для генерации опросника.</div>`;
  const templates = [
    e=>`Используете ли вы понятие <span class="q-entity">${e}</span> в своей работе? Как оно называется у вас?`,
    e=>`Как организован учёт <span class="q-entity">${e}</span>? Ведётся ли реестр или справочник?`,
    e=>`Кто в компании отвечает за управление <span class="q-entity">${e}</span>?`,
    e=>`Какие ключевые атрибуты есть у <span class="q-entity">${e}</span>? Что важно знать о каждом?`,
    e=>`Как <span class="q-entity">${e}</span> связан с другими элементами бизнеса?`,
    e=>`Есть ли у вас автоматизация для работы с <span class="q-entity">${e}</span>? Какая система?`,
  ];
  return ents.map((e,i)=>`<div class="q-item"><span class="q-num">${i+1}.</span><span class="q-text">${templates[i%templates.length](e)}</span></div>`).join("");
}

function openDetail(id){

  selectedEntities = [];

  const dc = getDomainClass(item.domain);
  const qw = Math.round(item.quality*100);

        <div><div style="font-size:0.65rem; color:var(--color-text-faint); text-transform:uppercase">Масштаб</div><div style="font-weight:600">${scope}</div></div>
    </div>
    <div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center">
        <span class="domain-badge ${dc}">${item.domain}</span>
        <span class="badge-status status-${item.status}">${item.status}</span>
        <span class="domain-badge" style="background:color-mix(in oklch,${TYPE_COLOR[item.type]||"var(--color-primary)"} 15%,var(--color-surface));color:${TYPE_COLOR[item.type]||"var(--color-primary)"}">${item.type}</span>
      </div>
    </div>
    <div>
      <div class="panel-section-title">Quality Score</div>
      <div class="quality-big">
        <span class="quality-num">${qw}%</span>
        <div class="quality-bar-big"><div class="quality-fill-big" style="width:${qw}%;background:${qualityColor(item.quality)}"></div></div>
      </div>
    </div>
    <div>
      <div class="panel-section-title">Теги и Форматы</div>
      <div class="entity-grid" style="margin-bottom:0.75rem">
        ${(item.formats||[]).map(f=>`<span class="fmt">${f}</span>`).join("")}
      </div>
      <div class="entity-grid">
        ${(item.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}
      </div>
    </div>
    <div>
      <div class="panel-section-title">Источники</div>
      <div style="display:flex;flex-direction:column;gap:0.4rem">
        ${(item.targets||[]).map(url=>`<a href="${url}" target="_blank" class="url-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>${url}</a>`).join("")}
      </div>
    </div>
    <div>
      <div class="panel-section-title">Ключевые сущности (для опросника)</div>
      <p style="font-size:0.7rem;color:var(--color-text-faint);margin-bottom:0.5rem">Нажмите, чтобы включить/исключить из опросника</p>
      <div class="entity-grid" id="entity-selector">
        ${(item.entities||[]).map(e=>`<button class="entity-chip selected" onclick="toggleEntity('${e}')">${e}</button>`).join("")}
      </div>
    </div>
    <div class="questionnaire">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <div class="panel-section-title" style="margin:0">Анкета для бизнеса</div>
        <button class="btn btn-sm btn-ghost" onclick="refreshQuestionnaire()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg> Обновить</button>
      </div>
      <div id="questionnaire">${generateQuestionnaire(item, [])}</div>
      <div style="margin-top:1rem;display:flex;justify-content:flex-end">
        <button class="btn btn-primary" onclick="alert('Скопировано в буфер обмена!')">Скопировать анкету</button>
      </div>
    </div>
  `;
  document.getElementById("detail-overlay").classList.add("open");
}

function toggleEntity(name){
  const el = Array.from(document.querySelectorAll("#entity-selector .entity-chip")).find(e=>e.textContent===name);
  if(!el) return;
  el.classList.toggle("selected");
  if(el.classList.contains("selected")){
    selectedEntities.push(name);
  } else {
    selectedEntities = selectedEntities.filter(e=>e!==name);
  }
  if(selectedItem) document.getElementById("questionnaire").innerHTML = generateQuestionnaire(selectedItem, selectedEntities);
}

function refreshQuestionnaire(){
  if(selectedItem) document.getElementById("questionnaire").innerHTML = generateQuestionnaire(selectedItem, selectedEntities);
}

function closeDetail(e){
  if(!e || e.target===document.getElementById("detail-overlay")){
    document.getElementById("detail-overlay").classList.remove("open");
    selectedItem=null;selectedEntities=[];
  }
}

// Debounce search
let searchTimeout;
document.getElementById("search").addEventListener("input",e=>{
  searchQuery = e.target.value;
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    fetchPage(1);
  }, 300);
});

async function initApp() {
  buildSidebarFilters();
  fetchPage(1);
}

initApp();

</script>
</body>
</html>
